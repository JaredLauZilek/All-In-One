# fly.toml app configuration file generated for lazada-monitor-worker on 2026-07-15T05:50:00Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'lazada-monitor-worker'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'immediate'

[env]
  # Jitter between products so requests don't look metronomic to anti-bot.
  JITTER_MS = '2000'
  # Loop granularity: must be well under the shortest check_interval_secs (10s) or it
  # would blunt it — a due product could wait up to TICK_MS before being picked up.
  TICK_MS = '2000'

[[vm]]
  # shared-cpu-1x could NOT run Chromium: ~38% CPU steal starved page rendering, so
  # every check hit the 45s timeout while plain curl fetched Lazada in 2.5s. Chromium
  # needs a real core. shared-cpu-2x/2gb is the tested floor. (Measured 2026-07.)
  size = 'shared-cpu-2x'
  memory = '2gb'
