# fly.toml app configuration file generated for lazada-monitor-worker on 2026-07-15T05:50:00Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'lazada-monitor-worker'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'immediate'

[env]
  # Jitter between products so requests don't look metronomic to anti-bot.
  JITTER_MS = '2000'
  # Loop granularity: must be well under the shortest check_interval_secs (10s) or it
  # would blunt it — a due product could wait up to TICK_MS before being picked up.
  TICK_MS = '2000'

[[vm]]
  # History: shared-cpu-1x could NOT run Chromium (~38% CPU steal → 45s timeouts while
  # plain curl fetched Lazada in 2.5s). 2 cores fixed that for a 10s interval; 4 cores
  # give the headroom for a SOLID 5s interval. Memory is generous — actual use is ~310MB,
  # so 1gb is ample (dropping from 2gb also saved ~$5/mo of unused RAM). (Measured 2026-07.)
  size = 'shared-cpu-4x'
  memory = '1gb'
